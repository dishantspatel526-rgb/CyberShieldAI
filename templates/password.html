<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cyber Shield AI | Password Checker</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<header>

    <nav class="navbar">

        <h2 class="logo">🛡 Cyber Shield AI</h2>

        <ul class="nav-links">

            <li><a href="/">Home</a></li>
            <li><a href="/scanner">Scanner</a></li>
            <li><a href="/password">Password</a></li>
            <li><a href="/email">Email</a></li>
            <li><a href="/ip">IP Checker</a></li>
            <li><a href="/hash">Hash</a></li>
            <li><a href="/dashboard">Dashboard</a></li>

        </ul>

    </nav>

</header>

<section class="tool-page">

    <h1>🔑 Password Strength Checker</h1>

    <p>
        Check whether your password is weak, medium, or strong.
    </p>

    <div class="tool-box">

        <input
            type="password"
            id="password"
            placeholder="Enter your password">

        <button onclick="checkPassword()">
            Check Password
        </button>

    </div>

    <div id="result" class="result-box">

        Waiting for password...

    </div>
    <script>

async function checkPassword() {

try {

const password =
document.getElementById("password").value;

if(password.trim()===""){

document.getElementById("result").innerHTML =
"❌ Please enter password";

return;

}

const response = await fetch("/check_password", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
password:password
})

});

const data = await response.json();

document.getElementById("result").innerHTML =

`
<h3>Password Analysis</h3>

<p><b>Strength:</b> ${data.strength}</p>

<p><b>Score:</b> ${data.score}/100</p>
`;

}

catch(error){

document.getElementById("result").innerHTML =
"❌ Server Error";

console.log(error);

}

}

</script>
</section>

<footer>

    <p>
        © 2026 Cyber Shield AI | Password Security Module
    </p>

</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
