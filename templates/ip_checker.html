<!DOCTYPE html>

<html>

<head>

<title>IP Security Checker</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


<style>

body{

background:#050816;

color:white;

font-family:Poppins;

}



.box{

width:500px;

margin:100px auto;

padding:30px;

background:#111827;

border:1px solid #00ff99;

border-radius:20px;

text-align:center;

box-shadow:0 0 20px #00ff99;

}



input{

padding:15px;

width:90%;

border-radius:10px;

}



button{

margin-top:15px;

padding:15px;

background:#00ff99;

border:none;

border-radius:10px;

font-weight:bold;

}



.result{

margin-top:20px;

color:#00ff99;

white-space:pre-line;

}

</style>

</head>


<body>


<div class="box">


<h1>🛡 IP Security Checker</h1>


<form method="POST">


<input name="ip" placeholder="Enter IP Address">


<br>


<button>

Check IP

</button>


</form>



<div class="result">

{{result}}

</div>



</div>


</body>

</html>
