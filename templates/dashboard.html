<!DOCTYPE html>
<html>

<head>

<title>Cyber Shield AI Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


<style>

body{

background:#050816;

color:white;

font-family:Poppins;

}



.container{

width:90%;

margin:50px auto;

}



.title{

text-align:center;

color:#00ff99;

font-size:35px;

}



.cards{

display:flex;

gap:20px;

margin:30px 0;

}



.card{

flex:1;

background:#111827;

padding:25px;

border-radius:15px;

text-align:center;

border:1px solid #00ff99;

box-shadow:0 0 15px #00ff99;

}



.card h2{

color:#00ff99;

}
<a href="/report">

<button style="
padding:15px;
background:#00ff99;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
">

Download PDF Report

</button>

</a>

table{

width:100%;

background:#020409;

border-collapse:collapse;

}



th{

background:#00ff99;

color:black;

padding:15px;

}



td{

padding:15px;

border-bottom:1px solid #333;

text-align:center;

}



</style>


</head>



<body>



<div class="container">


<div class="title">

🛡 Cyber Shield AI Dashboard

</div>



<div class="cards">


<div class="card">

<h2>{{total}}</h2>

<p>Total Scans</p>

</div>



<div class="card">

<h2>{{safe}}</h2>

<p>Safe URLs</p>

</div>



<div class="card">

<h2>{{risk}}</h2>

<p>Risk Found</p>

</div>



</div>




<table>


<tr>

<th>ID</th>

<th>URL</th>

<th>Status</th>

<th>Score</th>

<th>Time</th>

</tr>



{% for scan in scans %}


<tr>


<td>{{scan[0]}}</td>

<td>{{scan[1]}}</td>

<td>{{scan[2]}}</td>

<td>{{scan[3]}}%</td>

<td>{{scan[4]}}</td>


</tr>


{% endfor %}


</table>


</div>



</body>

</html>
