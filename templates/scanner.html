<!DOCTYPE html>
<html>
<head>
<title>Website Scanner</title>
</head>

<body>

<h1>CyberShieldAI Website Scanner</h1>

<form action="/scan" method="POST">
    <input type="text"
           name="url"
           placeholder="Enter Website URL">

    <button type="submit">
        Scan Website
    </button>
</form>

{% if result %}
    <h2>Result: {{ result }}</h2>
    <h3>Score: {{ score }}</h3>
{% endif %}
