<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cyber Shield AI | IP Checker</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<header>

    <nav class="navbar">

        <h2 class="logo">🛡 Cyber Shield AI</h2>

        <ul class="nav-links">

            <li><a href="/">Home</a></li>
            <li><a href="/scanner">Scanner</a></li>
            <li><a href="/password">Password</a></li>
            <li><a href="/email">Email</a></li>
            <li><a href="/ip">IP Checker</a></li>
            <li><a href="/hash">Hash</a></li>
            <li><a href="/dashboard">Dashboard</a></li>

        </ul>

    </nav>

</header>

<section class="tool-page">

    <h1>🌍 IP Address Checker</h1>

    <p>

        Check whether an IPv4 or IPv6 address is valid.

    </p>

    <div class="tool-box">

        <input
            type="text"
            id="ip"
            placeholder="192.168.1.1">

        <button onclick="checkIP()">

            Validate IP

        </button>

    </div>

    <div
        id="result"
        class="result-box">

        Waiting for IP...

    </div>

</section>

<script>

async function checkIP(){

let ip =
document.getElementById("ip").value;

if(ip.trim()==""){

document.getElementById("result").innerHTML =
"❌ Enter IP Address";

return;

}

document.getElementById("result").innerHTML =
"Checking...";

try{

const response =
await fetch("/check_ip",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
ip:ip
})

});

const data =
await response.json();

document.getElementById("result").innerHTML =

`
<h3>IP Result</h3>

<p>Status:
${data.status}</p>

<p>Score:
${data.score}/100</p>
`;

}

catch(e){

document.getElementById("result").innerHTML =
"❌ Server Error";

}

}

</script>

<footer>

<p>

© 2026 Cyber Shield AI | IP Checker

</p>

</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
