<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cyber Shield AI | SHA-256 Hash Generator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<header>

    <nav class="navbar">

        <h2 class="logo">🛡 Cyber Shield AI</h2>

        <ul class="nav-links">

            <li><a href="/">Home</a></li>
            <li><a href="/scanner">Scanner</a></li>
            <li><a href="/password">Password</a></li>
            <li><a href="/email">Email</a></li>
            <li><a href="/ip">IP Checker</a></li>
            <li><a href="/hash">Hash</a></li>
            <li><a href="/dashboard">Dashboard</a></li>

        </ul>

    </nav>

</header>

<section class="tool-page">

    <h1>🔐 SHA-256 Hash Generator</h1>

    <p>

        Enter any text to generate its SHA-256 hash.

    </p>

    <div class="tool-box">

        <textarea
            id="text"
            rows="6"
            placeholder="Enter text here..."></textarea>

        <button onclick="generateHash()">

            Generate Hash

        </button>

    </div>

    <div
        id="result"
        class="result-box">

        Waiting for input...

    </div>

    <button
        class="btn"
        onclick="copyHash()">

        📋 Copy Hash

    </button>

</section>

<script>

async function generateHash(){

    const text=document.getElementById("text").value;

    if(text.trim()==""){

        document.getElementById("result").innerHTML=
        "❌ Please enter some text.";

        return;

    }

    const response=await fetch("/generate_hash",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            text:text
        })

    });

    const data=await response.json();

    document.getElementById("result").innerHTML=`
        <h3>Generated SHA-256 Hash</h3>
        <textarea id="hashOutput" rows="5" readonly>${data.hash}</textarea>
    `;

}

function copyHash(){

    const output=document.getElementById("hashOutput");

    if(!output){

        alert("Generate a hash first.");

        return;

    }

    output.select();

    document.execCommand("copy");

    alert("Hash copied successfully!");

}

</script>

<footer>

<p>

© 2026 Cyber Shield AI | SHA-256 Generator

</p>

</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
